<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="../assets/logo-favicon.svg" type="image/x-icon">
    <title>Login - Flora Guard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/login.css">
</head>

<body class="d-flex justify-content-center align-items-center vh-100 bg-color-blue">
    <div class="d-flex flex-column align-items-center gap-4 efeito-vidro w-75 pt-5 pb-5">
        <img src="../assets/login/Group 2 (1).svg" alt="Flora Guard">
        <form class="p-4 rounded gap-3 d-flex flex-column text-white w-100">
            <div class="d-flex flex-column">
                <label for="user">Usuário:</label>
                <input type="text" class="form-control" name="user" id="user" required>
            </div>
            
            <div class="d-flex flex-column">
                <label for="password">Senha:</label>
                <input type="password" class="form-control" name="password" id="password" required>
            </div>
            
            <button type="button" class="btn btn-primary w-100" onclick="FazerLogin()">Entrar</button>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous">
        </script>
    <script src="../js/login.js"></script>
</body>

</html>
