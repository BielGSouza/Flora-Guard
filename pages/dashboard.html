<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Flora Guard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="../css/dashboard.css">
    <link rel="stylesheet" href="../css/style.css">
</head>

<body class="bg-color-blue w-100 v-100">
    <div class="container">
        <header class="d-flex align-items-center justify-content-between gap-3 p-2 bg-color-blue-dois rounded-5 mt-2">
            <img src="../assets/dashboard/logo-header.png" alt="Logo da Flora Guard">
            <div class="d-flex align-items-center gap-3 border-left border-white ps-3">
                <p class="texto-header text-white mb-0 SpaceGrotesk">MONITORAMENTO</p>
                <div class="icone-user">
                    <img src="../assets/dashboard/User 1.svg" alt="">
                </div>
            </div>
        </header>
    </div>

    <div class="container d-flex align-items-center justify-content-between pt-3">
        <h4 class="SpaceGrotesk mb-0 text-white">DASHBORD</h4>
        <div class="d-flex align-items-center gap-2 px-2 borda-card-ativo">
            <div id="circle"></div>
            <p class="text-card-ativo mb-0">SISTEMA ATIVO</p>
        </div>
    </div>

    <section>
        <div class="container">
            <iframe src="https://earth.nullschool.net/pt/" frameborder="0" class="w-100"></iframe>
        </div>
        </section>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous">
        </script>
</body>

</html>
